<!DOCTYPE html>
<html>
<head>
    <title>Plant Disease Detection</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #d4fc79, #96e6a1);
        }

        .container {
            background: white;
            padding: 30px;
            margin: 50px auto;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: #2e7d32;
        }

        input[type="file"] {
            margin: 15px;
        }

        button {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b5e20;
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #1b5e20;
        }
    </style>

</head>

<body>

<div class="container">
    <h1>🌿 Plant Disease Detection</h1>

    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Upload</button>
    </form>

    {% if filename %}
        <h3>Uploaded Image:</h3>
        <img src="{{ url_for('static', filename=filename) }}" width="250">
    {% endif %}

    {% if prediction %}
        <div class="result">
            Prediction: {{ prediction }}
        </div>
    {% endif %}

</div>

</body>
</html>
